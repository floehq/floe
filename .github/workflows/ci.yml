name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

timeout-minutes: 15

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: ESLint (API)
        run: npx eslint "apps/api/src/**/*.ts"
        working-directory: ${{ github.workspace }}

      - name: ESLint (SDK)
        run: npx eslint "src/**/*.ts"
        working-directory: apps/sdk

      - name: ESLint (CLI)
        run: npx eslint "src/**/*.ts"
        working-directory: apps/cli

      - name: Prettier
        run: npx prettier --check "apps/api/src/**/*.ts" "apps/sdk/src/**/*.ts" "apps/cli/src/**/*.ts"
        working-directory: ${{ github.workspace }}

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: TypeScript (API)
        run: npx tsc --noEmit
        working-directory: apps/api

      - name: TypeScript (SDK)
        run: npx tsc --noEmit
        working-directory: apps/sdk

      - name: TypeScript (CLI)
        run: npx tsc --noEmit
        working-directory: apps/cli

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Run unit tests
        run: npx tsx --test --no-coverage $(ls ./test/*.test.ts | grep -v '.integration.test.ts' | tr '\n' ' ')
        working-directory: apps/api

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: floe_test
          POSTGRES_PASSWORD: floe_test
          POSTGRES_DB: floe_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U floe_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Run integration tests
        run: npx tsx --test --no-coverage ./test/*.integration.test.ts
        working-directory: apps/api
        env:
          FLOE_POSTGRES_REQUIRED: "1"
          FLOE_API_KEY_STORE: postgres
          FLOE_AUTH_PROVIDER: local
          DATABASE_URL: postgresql://floe_test:floe_test@localhost:5432/floe_test
          FLOE_REDIS_PROVIDER: native
          REDIS_URL: redis://localhost:6379
