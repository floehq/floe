name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  api:
    name: Build and Test API
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Redis
        run: sudo apt-get update && sudo apt-get install -y redis-server

      - name: Verify redis-server is available
        run: redis-server --version

      - name: Build API
        run: npm run build --workspace=apps/api

      - name: Test API
        run: npm test --workspace=apps/api

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint (ESLint + Prettier)
        run: npm run lint

  audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (high+)
        run: npm audit --audit-level=high
