version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: floe_test
      POSTGRES_PASSWORD: floe_test
      POSTGRES_DB: floe_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U floe_test"]
      interval: 5s
      timeout: 3s
      retries: 5
